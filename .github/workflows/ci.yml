name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "CHANGELOG.md"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "CHANGELOG.md"

jobs:
  test:
    # Runner via CI_RUNNER (uplift self-hosted; ubuntu-latest = break-glass,
    # billing-blocked until Aug 1). Pure-python matrix; no portability changes needed.
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest tests/ -v
